name: Daily Vulcan7 Off-Market Job

on:
  schedule:
    - cron: "0 13 * * *"  # 9:00 AM ET during DST (UTC-4)
    - cron: "0 14 * * *"  # 9:00 AM ET during Standard Time (UTC-5)
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      PUPPETEER_SKIP_DOWNLOAD: "true"  # we install system Chromium
    steps:
      - name: Gate to exactly 9:00 AM ET
        run: |
          NOW_ET=$(TZ=America/New_York date +'%H:%M')
          echo "Now ET: $NOW_ET"
          if [ "$NOW_ET" != "09:00" ]; then
            echo "Not 09:00 ET — exiting."
            exit 0
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Restore dedupe cache
        uses: actions/cache@v4
        with:
          path: sent-leads-cache-offmarket.json
          key: offmarket-cache-v1

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
          if command -v chromium-browser >/dev/null 2>&1; then
            echo "PUPPETEER_EXECUTABLE_PATH=$(command -v chromium-browser)" >> $GITHUB_ENV
          elif command -v chromium >/dev/null 2>&1; then
            echo "PUPPETEER_EXECUTABLE_PATH=$(command -v chromium)" >> $GITHUB_ENV
          fi

      - name: Run script
        run: node vulcan7_offmarket_script.js

      - name: Save dedupe cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: sent-leads-cache-offmarket.json
          key: offmarket-cache-v1

      - name: Upload failure artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            failure.png
            sent-leads-cache-offmarket.json
          if-no-files-found: ignore
